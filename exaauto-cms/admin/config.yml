backend:
  name: github
  repo: exaauto/exaauto
  branch: main
  site_domain: exaauto.it

media_folder: "exaauto-cms/images"
public_folder: "/images"

collections:
  - name: "cars"
    label: "Auto in Vendita"
    folder: "data/cars"
    create: true
    extension: json
    format: json
    slug: "{{slug}}"
    fields:
      - {label: "Titolo", name: "title", widget: "string"}
      - {label: "Prezzo", name: "price", widget: "string"}
      - {label: "Anno", name: "year", widget: "number"}
      - {label: "Km", name: "km", widget: "string"}
      - {label: "Alimentazione", name: "fuel", widget: "select", options: ["Benzina", "Diesel", "Ibrido", "Elettrico", "Gpl"]}
      - {label: "Immagine", name: "image", widget: "image"}
      - {label: "Badge", name: "badge", widget: "string", required: false}
      - {label: "Descrizione Breve", name: "excerpt", widget: "text"}
      - {label: "In Evidenza", name: "featured", widget: "boolean", default: false}
      - {label: "Data", name: "date", widget: "datetime"}

  - name: "news"
    label: "Novità & Blog"
    folder: "data/news"
    create: true
    extension: json
    format: json
    slug: "{{slug}}"
    fields:
      - {label: "Titolo", name: "title", widget: "string"}
      - {label: "Categoria", name: "category", widget: "string"}
      - {label: "Immagine", name: "image", widget: "image"}
      - {label: "Anteprima", name: "excerpt", widget: "text"}
      - {label: "Contenuto Completo", name: "body", widget: "markdown"}
      - {label: "Data", name: "date", widget: "datetime"}
