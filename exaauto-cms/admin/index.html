<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExaAuto Admin | CMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e01e37;
            --red-dark: #b5162c;
            --bg: #0a0a0b;
            --bg2: #111113;
            --bg3: #181819;
            --surface: #1c1c1f;
            --surface2: #252528;
            --border: rgba(255,255,255,0.07);
            --text: #f0f0f2;
            --text-muted: #7a7a85;
            --text-dim: #4a4a52;
            --font-display: 'Bebas Neue', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.6;
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 60px 40px;
            max-width: 400px;
            width: 100%;
        }

        .login-logo {
            font-family: var(--font-display);
            font-size: 48px;
            letter-spacing: 0.08em;
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo span {
            color: var(--red);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-input {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 14px 16px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .login-input:focus {
            border-color: var(--red);
        }

        .login-input::placeholder {
            color: var(--text-dim);
        }

        .login-btn {
            background: var(--red);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 3px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s var(--ease);
        }

        .login-btn:hover {
            background: var(--red-dark);
            transform: translateY(-2px);
        }

        /* Admin Screen */
        .admin-screen {
            display: none;
        }

        .admin-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            height: 72px;
            background: rgba(10, 10, 11, 0.95);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
        }

        .admin-logo {
            font-family: var(--font-display);
            font-size: 24px;
            letter-spacing: 0.08em;
        }

        .admin-logo span {
            color: var(--red);
        }

        .admin-nav {
            display: flex;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 3px;
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.25s var(--ease);
        }

        .btn-primary {
            background: var(--red);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--red-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--surface2);
            color: var(--text);
        }

        /* Sidebar */
        .admin-container {
            display: flex;
            margin-top: 72px;
            min-height: calc(100vh - 72px);
        }

        .sidebar {
            width: 250px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            padding: 32px 0;
            position: sticky;
            top: 72px;
            height: calc(100vh - 72px);
            overflow-y: auto;
        }

        .sidebar-item {
            padding: 12px 24px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            border-left: 2px solid transparent;
            display: block;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            font-size: 14px;
        }

        .sidebar-item:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.02);
        }

        .sidebar-item.active {
            color: var(--red);
            border-left-color: var(--red);
            background: rgba(224, 30, 55, 0.08);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px 5%;
            overflow-y: auto;
        }

        .content-header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-title {
            font-family: var(--font-display);
            font-size: 48px;
            letter-spacing: 0.02em;
        }

        /* Section */
        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* Form */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 14px 16px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            border-color: var(--red);
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--text-dim);
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Image Upload */
        .image-upload {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 3px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .image-upload:hover {
            border-color: var(--red);
            background: rgba(224, 30, 55, 0.04);
        }

        .image-upload input {
            display: none;
        }

        .image-preview {
            margin-top: 16px;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 3px;
        }

        /* Item Grid */
        .item-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-top: 32px;
        }

        .item-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.3s var(--ease);
        }

        .item-card:hover {
            border-color: var(--red);
            box-shadow: 0 8px 24px rgba(224, 30, 55, 0.15);
        }

        .item-card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: var(--bg3);
        }

        .item-card-body {
            padding: 20px;
        }

        .item-title {
            font-family: var(--font-display);
            font-size: 20px;
            letter-spacing: 0.03em;
            margin-bottom: 8px;
        }

        .item-meta {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .item-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .item-action {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
            background: var(--bg3);
            color: var(--text-muted);
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .item-action:hover {
            background: var(--red);
            color: #fff;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 32px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: 32px;
            letter-spacing: 0.02em;
            margin-bottom: 24px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            justify-content: flex-end;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1/-1;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-text {
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .item-grid {
                grid-template-columns: 1fr;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: static;
                border-right: none;
                border-bottom: 1px solid var(--border);
                display: flex;
                padding: 16px 5%;
                gap: 8px;
                flex-wrap: wrap;
            }

            .sidebar-item {
                padding: 8px 16px;
                white-space: nowrap;
            }

            .content-title {
                font-size: 32px;
            }

            .login-box {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="login-logo">EXA<span>AUTO</span></div>
            <form class="login-form" onsubmit="login(event)">
                <input type="password" id="passwordInput" class="login-input" placeholder="Inserisci password" required>
                <button type="submit" class="login-btn">Accedi</button>
            </form>
        </div>
    </div>

    <!-- Admin Screen -->
    <div class="admin-screen" id="adminScreen">
        <!-- Header -->
        <header class="admin-header">
            <div class="admin-logo">EXA<span>AUTO</span> Admin</div>
            <div class="admin-nav">
                <button class="btn btn-secondary" onclick="downloadData()">⬇️ Backup</button>
                <button class="btn btn-secondary" onclick="uploadData()">⬆️ Ripristina</button>
                <button class="btn btn-secondary" onclick="logout()">🚪 Esci</button>
            </div>
        </header>

        <!-- Container -->
        <div class="admin-container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <button class="sidebar-item active" onclick="showSection('cars')">📸 Annunci Auto</button>
                <button class="sidebar-item" onclick="showSection('news')">📰 Novità & Blog</button>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Auto Section -->
                <section class="section active" id="cars">
                    <div class="content-header">
                        <h1 class="content-title">Annunci Auto</h1>
                        <button class="btn btn-primary" onclick="openAddCarModal()">+ Aggiungi Auto</button>
                    </div>
                    <div id="carsList" class="item-grid"></div>
                </section>

                <!-- News Section -->
                <section class="section" id="news">
                    <div class="content-header">
                        <h1 class="content-title">Novità & Blog</h1>
                        <button class="btn btn-primary" onclick="openAddNewsModal()">+ Aggiungi Articolo</button>
                    </div>
                    <div id="newsList" class="item-grid"></div>
                </section>
            </main>
        </div>
    </div>

    <!-- Car Modal -->
    <div class="modal" id="carModal">
        <div class="modal-content">
            <h2 class="modal-title" id="carModalTitle">Aggiungi Auto</h2>

            <div class="form-group">
                <label class="form-label">Titolo *</label>
                <input type="text" class="form-input" id="carTitle" placeholder="Es: Audi A4 Sportback" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label class="form-label">Prezzo (€) *</label>
                    <input type="number" class="form-input" id="carPrice" placeholder="25000" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Anno *</label>
                    <input type="number" class="form-input" id="carYear" placeholder="2022" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Km *</label>
                    <input type="text" class="form-input" id="carKm" placeholder="45000" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Alimentazione *</label>
                    <input type="text" class="form-input" id="carFuel" placeholder="Benzina" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Badge (opzionale)</label>
                <input type="text" class="form-input" id="carBadge" placeholder="Es: Ribassato">
            </div>

            <div class="form-group">
                <label class="form-label">Descrizione *</label>
                <textarea class="form-textarea" id="carExcerpt" placeholder="Descrizione breve" required></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Foto *</label>
                <div class="image-upload" onclick="document.getElementById('carImage').click()">
                    <input type="file" id="carImage" accept="image/*" required>
                    <div>📁 Clicca per caricare</div>
                    <div id="carImagePreview" class="image-preview"></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">In Evidenza?</label>
                <select class="form-select" id="carFeatured">
                    <option value="false">No</option>
                    <option value="true">Sì</option>
                </select>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeCarModal()">Annulla</button>
                <button class="btn btn-primary" onclick="saveCarData()">Salva</button>
            </div>
        </div>
    </div>

    <!-- News Modal -->
    <div class="modal" id="newsModal">
        <div class="modal-content">
            <h2 class="modal-title" id="newsModalTitle">Aggiungi Articolo</h2>

            <div class="form-group">
                <label class="form-label">Titolo *</label>
                <input type="text" class="form-input" id="newsTitle" placeholder="Es: Nuovo Modello" required>
            </div>

            <div class="form-group">
                <label class="form-label">Categoria *</label>
                <input type="text" class="form-input" id="newsCategory" placeholder="Es: Notizie" required>
            </div>

            <div class="form-group">
                <label class="form-label">Foto *</label>
                <div class="image-upload" onclick="document.getElementById('newsImage').click()">
                    <input type="file" id="newsImage" accept="image/*" required>
                    <div>📁 Clicca per caricare</div>
                    <div id="newsImagePreview" class="image-preview"></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Anteprima *</label>
                <textarea class="form-textarea" id="newsExcerpt" placeholder="Breve anteprima" required></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Contenuto Completo *</label>
                <textarea class="form-textarea" id="newsBody" placeholder="Contenuto completo" required style="min-height: 200px;"></textarea>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeNewsModal()">Annulla</button>
                <button class="btn btn-primary" onclick="saveNewsData()">Salva</button>
            </div>
        </div>
    </div>

    <input type="file" id="uploadFile" style="display: none;" accept=".json" onchange="importData(event)">

    <script>
        const ADMIN_PASSWORD = 'exaauto2024';
        let currentEditingCar = null;
        let currentEditingNews = null;

        // Check if already logged in
        if (sessionStorage.getItem('adminLoggedIn')) {
            showAdminScreen();
            loadData();
        }

        function login(e) {
            e.preventDefault();
            const password = document.getElementById('passwordInput').value;
            
            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                showAdminScreen();
                loadData();
            } else {
                alert('❌ Password errata');
                document.getElementById('passwordInput').value = '';
            }
        }

        function logout() {
            if (confirm('Sei sicuro di voler uscire?')) {
                sessionStorage.removeItem('adminLoggedIn');
                location.reload();
            }
        }

        function showAdminScreen() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminScreen').style.display = 'block';
        }

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.getElementById(section).classList.add('active');
            event.target.classList.add('active');
        }

        // Data Management
        function loadData() {
            const cars = JSON.parse(localStorage.getItem('exaauto_cars')) || [];
            const news = JSON.parse(localStorage.getItem('exaauto_news')) || [];
            
            renderCars(cars);
            renderNews(news);
        }

        function getCars() {
            return JSON.parse(localStorage.getItem('exaauto_cars')) || [];
        }

        function getNews() {
            return JSON.parse(localStorage.getItem('exaauto_news')) || [];
        }

        function saveCars(cars) {
            localStorage.setItem('exaauto_cars', JSON.stringify(cars));
        }

        function saveNews(news) {
            localStorage.setItem('exaauto_news', JSON.stringify(news));
        }

        // Render Functions
        function renderCars(cars) {
            if (cars.length === 0) {
                document.getElementById('carsList').innerHTML = '<div class="empty-state"><div class="empty-state-icon">🚗</div><p class="empty-state-text">Nessun annuncio. Aggiungine uno!</p></div>';
                return;
            }

            document.getElementById('carsList').innerHTML = cars.map((car, idx) => `
                <div class="item-card">
                    <img src="${car.image}" alt="${car.title}" class="item-card-img">
                    <div class="item-card-body">
                        <h3 class="item-title">${car.title}</h3>
                        <div class="item-meta">${car.year} · ${car.km} km · ${car.fuel}</div>
                        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px;">€ ${Number(car.price).toLocaleString('it-IT')}</p>
                        <div class="item-actions">
                            <button class="item-action" onclick="editCar(${idx})">✏️ Modifica</button>
                            <button class="item-action" onclick="deleteCar(${idx})">🗑️ Elimina</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderNews(news) {
            if (news.length === 0) {
                document.getElementById('newsList').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p class="empty-state-text">Nessun articolo. Aggiungine uno!</p></div>';
                return;
            }

            document.getElementById('newsList').innerHTML = news.map((item, idx) => `
                <div class="item-card">
                    <img src="${item.image}" alt="${item.title}" class="item-card-img">
                    <div class="item-card-body">
                        <h3 class="item-title">${item.title}</h3>
                        <div class="item-meta">${item.category}</div>
                        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.4;">${item.excerpt}</p>
                        <div class="item-actions">
                            <button class="item-action" onclick="editNews(${idx})">✏️ Modifica</button>
                            <button class="item-action" onclick="deleteNews(${idx})">🗑️ Elimina</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Car Functions
        function openAddCarModal() {
            currentEditingCar = null;
            document.getElementById('carModalTitle').textContent = 'Aggiungi Auto';
            document.getElementById('carTitle').value = '';
            document.getElementById('carPrice').value = '';
            document.getElementById('carYear').value = '';
            document.getElementById('carKm').value = '';
            document.getElementById('carFuel').value = '';
            document.getElementById('carBadge').value = '';
            document.getElementById('carExcerpt').value = '';
            document.getElementById('carImage').value = '';
            document.getElementById('carImagePreview').innerHTML = '';
            document.getElementById('carFeatured').value = 'false';
            document.getElementById('carModal').classList.add('active');
        }

        function editCar(idx) {
            const cars = getCars();
            const car = cars[idx];
            currentEditingCar = idx;

            document.getElementById('carModalTitle').textContent = 'Modifica Auto';
            document.getElementById('carTitle').value = car.title;
            document.getElementById('carPrice').value = car.price;
            document.getElementById('carYear').value = car.year;
            document.getElementById('carKm').value = car.km;
            document.getElementById('carFuel').value = car.fuel;
            document.getElementById('carBadge').value = car.badge;
            document.getElementById('carExcerpt').value = car.excerpt;
            document.getElementById('carFeatured').value = car.featured;
            document.getElementById('carImagePreview').innerHTML = `<img src="${car.image}" alt="Preview">`;
            document.getElementById('carImage').value = '';

            document.getElementById('carModal').classList.add('active');
        }

        function closeCarModal() {
            document.getElementById('carModal').classList.remove('active');
        }

        function deleteCar(idx) {
            if (confirm('Sei sicuro? Questa azione non può essere annullata.')) {
                const cars = getCars();
                cars.splice(idx, 1);
                saveCars(cars);
                renderCars(cars);
            }
        }

        function saveCarData() {
            const imageFile = document.getElementById('carImage').files[0];
            
            if (!document.getElementById('carTitle').value) {
                alert('Completa il titolo');
                return;
            }

            if (currentEditingCar === null && !imageFile) {
                alert('Carica una foto');
                return;
            }

            if (imageFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const carData = {
                        title: document.getElementById('carTitle').value,
                        price: document.getElementById('carPrice').value,
                        year: document.getElementById('carYear').value,
                        km: document.getElementById('carKm').value,
                        fuel: document.getElementById('carFuel').value,
                        badge: document.getElementById('carBadge').value,
                        excerpt: document.getElementById('carExcerpt').value,
                        featured: document.getElementById('carFeatured').value === 'true',
                        image: e.target.result,
                        date: new Date().toISOString()
                    };

                    const cars = getCars();
                    if (currentEditingCar !== null) {
                        cars[currentEditingCar] = carData;
                    } else {
                        cars.push(carData);
                    }
                    saveCars(cars);
                    renderCars(cars);
                    closeCarModal();
                };
                reader.readAsDataURL(imageFile);
            } else {
                const carData = {
                    title: document.getElementById('carTitle').value,
                    price: document.getElementById('carPrice').value,
                    year: document.getElementById('carYear').value,
                    km: document.getElementById('carKm').value,
                    fuel: document.getElementById('carFuel').value,
                    badge: document.getElementById('carBadge').value,
                    excerpt: document.getElementById('carExcerpt').value,
                    featured: document.getElementById('carFeatured').value === 'true',
                    image: document.getElementById('carImagePreview').innerHTML.match(/src="([^"]*)"/)[1],
                    date: new Date().toISOString()
                };

                const cars = getCars();
                cars[currentEditingCar] = carData;
                saveCars(cars);
                renderCars(cars);
                closeCarModal();
            }
        }

        // News Functions
        function openAddNewsModal() {
            currentEditingNews = null;
            document.getElementById('newsModalTitle').textContent = 'Aggiungi Articolo';
            document.getElementById('newsTitle').value = '';
            document.getElementById('newsCategory').value = '';
            document.getElementById('newsExcerpt').value = '';
            document.getElementById('newsBody').value = '';
            document.getElementById('newsImage').value = '';
            document.getElementById('newsImagePreview').innerHTML = '';
            document.getElementById('newsModal').classList.add('active');
        }

        function editNews(idx) {
            const news = getNews();
            const item = news[idx];
            currentEditingNews = idx;

            document.getElementById('newsModalTitle').textContent = 'Modifica Articolo';
            document.getElementById('newsTitle').value = item.title;
            document.getElementById('newsCategory').value = item.category;
            document.getElementById('newsExcerpt').value = item.excerpt;
            document.getElementById('newsBody').value = item.body;
            document.getElementById('newsImagePreview').innerHTML = `<img src="${item.image}" alt="Preview">`;
            document.getElementById('newsImage').value = '';

            document.getElementById('newsModal').classList.add('active');
        }

        function closeNewsModal() {
            document.getElementById('newsModal').classList.remove('active');
        }

        function deleteNews(idx) {
            if (confirm('Sei sicuro? Questa azione non può essere annullata.')) {
                const news = getNews();
                news.splice(idx, 1);
                saveNews(news);
                renderNews(news);
            }
        }

        function saveNewsData() {
            const imageFile = document.getElementById('newsImage').files[0];
            
            if (!document.getElementById('newsTitle').value) {
                alert('Completa il titolo');
                return;
            }

            if (currentEditingNews === null && !imageFile) {
                alert('Carica una foto');
                return;
            }

            if (imageFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const newsData = {
                        title: document.getElementById('newsTitle').value,
                        category: document.getElementById('newsCategory').value,
                        excerpt: document.getElementById('newsExcerpt').value,
                        body: document.getElementById('newsBody').value,
                        image: e.target.result,
                        date: new Date().toISOString()
                    };

                    const news = getNews();
                    if (currentEditingNews !== null) {
                        news[currentEditingNews] = newsData;
                    } else {
                        news.push(newsData);
                    }
                    saveNews(news);
                    renderNews(news);
                    closeNewsModal();
                };
                reader.readAsDataURL(imageFile);
            } else {
                const newsData = {
                    title: document.getElementById('newsTitle').value,
                    category: document.getElementById('newsCategory').value,
                    excerpt: document.getElementById('newsExcerpt').value,
                    body: document.getElementById('newsBody').value,
                    image: document.getElementById('newsImagePreview').innerHTML.match(/src="([^"]*)"/)[1],
                    date: new Date().toISOString()
                };

                const news = getNews();
                news[currentEditingNews] = newsData;
                saveNews(news);
                renderNews(news);
                closeNewsModal();
            }
        }

        // Backup Functions
        function downloadData() {
            const data = {
                cars: getCars(),
                news: getNews(),
                timestamp: new Date().toISOString()
            };

            const dataStr = JSON.stringify(data, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `exaauto-backup-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
        }

        function uploadData() {
            document.getElementById('uploadFile').click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.cars) localStorage.setItem('exaauto_cars', JSON.stringify(data.cars));
                    if (data.news) localStorage.setItem('exaauto_news', JSON.stringify(data.news));
                    alert('✅ Dati ripristinati!');
                    loadData();
                } catch (error) {
                    alert('❌ File non valido');
                }
            };
            reader.readAsText(file);
        }

        // Handle image preview clicks
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal')) {
                e.target.classList.remove('active');
            }
        });

        // Image preview handlers
        document.getElementById('carImage')?.addEventListener('change', function(e) {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('carImagePreview').innerHTML = `<img src="${event.target.result}" alt="Preview">`;
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        document.getElementById('newsImage')?.addEventListener('change', function(e) {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('newsImagePreview').innerHTML = `<img src="${event.target.result}" alt="Preview">`;
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });
    </script>
</body>
</html>
